openapi: 3.0.0
info:
  title: Centralized Identity Provider (IdP) API
  description: An enterprise-grade authentication and authorization service.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local Development Server

# This defines the Bearer token requirement globally
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '201':
          description: User registered successfully
        '409':
          description: User already exists
        '429':
          description: Too many requests

  /auth/login:
    post:
      summary: Authenticate user and receive tokens
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful, returns access and refresh tokens
        '401':
          description: Invalid email or password

  /users/profile:
    get:
      summary: Get user profile
      tags: [Protected Routes]
      security:
        - bearerAuth: [] # This enforces the JWT check for this route
      responses:
        '200':
          description: Profile retrieved successfully
        '401':
          description: Access denied. No token provided.
        '403':
          description: Invalid or expired token.